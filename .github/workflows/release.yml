name: release

on:
  workflow_call:
    inputs:
      publish-packages:
        description: Comma-separated list of sub-folders to publish
        type: string
        required: false
      skip-test:
        type: boolean
        description: Skip tests
        required: false
        default: true
      squash-commits:
        type: boolean
        description: Override auto-squash behavior (useful for debugging)
        required: false

permissions:
  id-token: write
  contents: read

env:
  HUSKY: 0

jobs:
  get-commits:
    runs-on: ubuntu-latest
    outputs:
      commit-matrix: ${{ steps.get-commits.outputs.commit-matrix }}
      should-squash: ${{ inputs.squash-commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Get commits
        id: get-commits
        uses: michaeldowseza/actions/.github/actions/get-commits@main
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build:
    needs: get-commits
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.get-commits.outputs.commit-matrix) }}
      fail-fast: false
    outputs:
      matrix-results: ${{ steps.set-result.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ matrix.commit.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build
      - run: npm run test
        if: ${{ inputs.skip-test == false }}

      - name: Upload build artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.commit.sha }}
          path: lib

      - name: Set result for this matrix run
        id: set-result
        run: |
          FULL_ID="${{ steps.upload-artifacts.outputs.artifact-id }}"
          NUMERIC_ID=$(echo $FULL_ID | sed 's/github_actions_artifact_//')
          RESULT=$(jq -n \
            --arg artifact_id "$NUMERIC_ID" \
            --arg sha "${{ matrix.commit.sha }}" \
            --arg message "${{ matrix.commit.message }}" \
            '{
              "artifact-id": $artifact_id,
              "sha": $sha,
              "message": $message
            }')
          echo "result=${RESULT}" >> $GITHUB_OUTPUT

  collect-results:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      build-results: ${{ steps.combine.outputs.combined_results }}
      latest-artifact-id: ${{ steps.get-latest.outputs.latest_id }}
    steps:
      - name: Combine matrix results
        id: combine
        run: |
          RESULTS='${{ toJSON(needs.build.outputs.matrix-results) }}'
          echo "combined_results=[${RESULTS}]" >> $GITHUB_OUTPUT

      - name: Get latest artifact ID
        id: get-latest
        run: |
          RESULTS='${{ toJSON(needs.build.outputs.matrix-results) }}'
          LATEST_ID=$(echo "$RESULTS" | jq -r '.["artifact-id"]')
          echo "latest_id=${LATEST_ID}" >> $GITHUB_OUTPUT

  finalize:
    needs: [get-commits, collect-results]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CODEARTIFACT_ROLE }}
          aws-region: us-west-2

      - name: Run CodeBuild
        id: codebuild
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: Importer-v2
          disable-source-override: true
          hide-cloudwatch-logs: true
          env-vars-for-codebuild: |
            AWSUI_GITHUB_ARTIFACT_ID,
            AWSUI_GITHUB_BRANCH_NAME,
            AWSUI_GITHUB_COMMIT_SHA,
            AWSUI_GITHUB_COMMIT_MESSAGE,
            AWSUI_GITHUB_COMMITS,
            AWSUI_GITHUB_SHOULD_SQUASH,
            AWSUI_GITHUB_REPOSITORY_NAME,
            AWSUI_GITHUB_TOKEN,
            AWSUI_GITHUB_BUILD_RESULTS
        env:
          # Original variables for backwards compatibility
          AWSUI_GITHUB_ARTIFACT_ID: ${{ needs.build.outputs.latest-artifact-id }}
          AWSUI_GITHUB_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          AWSUI_GITHUB_COMMIT_SHA: ${{ github.sha }}
          AWSUI_GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          AWSUI_GITHUB_REPOSITORY_NAME: ${{ github.event.repository.full_name }}
          AWSUI_GITHUB_TOKEN: ${{ github.token }}
          # New variable for enhanced functionality
          AWSUI_GITHUB_BUILD_RESULTS: ${{ needs.build.outputs.build-results }}
          AWSUI_GITHUB_COMMITS: ${{ needs.get-commits.outputs.commit-matrix }}
          AWSUI_GITHUB_SHOULD_SQUASH: ${{ needs.get-commits.outputs.should-squash }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Release action failed. Check the build logs for details."