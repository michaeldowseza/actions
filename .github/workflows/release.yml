name: release

on:
  workflow_call:
    inputs:
      publish-packages:
        description: Comma-separated list of sub-folders to publish
        type: string
        required: false
      skip-test:
        type: boolean
        description: Skip tests
        required: false
        default: true
      squash-commits:
        type: boolean
        description: Override auto-squash behavior (useful for debugging)
        required: false

permissions:
  id-token: write
  contents: read

env:
  HUSKY: 0

jobs:
  get-commits:
    runs-on: ubuntu-latest
    outputs:
      commit-matrix: ${{ steps.get-commits.outputs.commit-matrix }}
      should-squash: ${{ inputs.squash-commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Get commits
        id: get-commits
        uses: michaeldowseza/actions/.github/actions/get-commits@main
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build:
    needs: get-commits
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.get-commits.outputs.commit-matrix) }}
      fail-fast: false
    outputs:
      build-results: ${{ toJSON(steps.*.outputs) }}
      latest-artifact-id: ${{ steps.get-latest-artifact.outputs.artifact_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ matrix.commit.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build
      - run: npm run test
        if: ${{ inputs.skip-test == false }}

      - name: Upload build artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.commit.sha }}
          path: lib

      - name: Set build result
        id: set-result
        run: |
          echo "build_info={\"sha\":\"${{ matrix.commit.sha }}\",\"message\":\"${{ matrix.commit.message }}\",\"artifact_name\":\"release-${{ matrix.commit.sha }}\"}" >> $GITHUB_OUTPUT

      - name: Get latest artifact ID
        id: get-latest-artifact
        run: |
          echo "artifact_id=release-${{ matrix.commit.sha }}" >> $GITHUB_OUTPUT          

  finalize:
    needs: [get-commits, build]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CODEARTIFACT_ROLE }}
          aws-region: us-west-2

      - name: Run CodeBuild
        id: codebuild
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: Importer-v2
          disable-source-override: true
          hide-cloudwatch-logs: true
          env-vars-for-codebuild: |
            AWSUI_GITHUB_ARTIFACT_ID,
            AWSUI_GITHUB_BRANCH_NAME,
            AWSUI_GITHUB_COMMIT_SHA,
            AWSUI_GITHUB_COMMIT_MESSAGE,
            AWSUI_GITHUB_COMMITS,
            AWSUI_GITHUB_SHOULD_SQUASH,
            AWSUI_GITHUB_REPOSITORY_NAME,
            AWSUI_GITHUB_TOKEN,
            AWSUI_GITHUB_BUILD_RESULTS
        env:
          # Original variables for backwards compatibility
          AWSUI_GITHUB_ARTIFACT_ID: ${{ needs.build.outputs.latest-artifact-id }}
          AWSUI_GITHUB_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          AWSUI_GITHUB_COMMIT_SHA: ${{ github.sha }}
          AWSUI_GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          AWSUI_GITHUB_REPOSITORY_NAME: ${{ github.event.repository.full_name }}
          AWSUI_GITHUB_TOKEN: ${{ github.token }}
          # New variable for enhanced functionality
          AWSUI_GITHUB_BUILD_RESULTS: ${{ needs.build.outputs.build-results }}
          AWSUI_GITHUB_COMMITS: ${{ needs.get-commits.outputs.commit-matrix }}
          AWSUI_GITHUB_SHOULD_SQUASH: ${{ needs.get-commits.outputs.should-squash }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Release action failed. Check the build logs for details."